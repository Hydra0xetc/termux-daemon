name: Build Project

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch:
          - arm64-v8a
          - armeabi-v7a

    permissions:
      contents: write

    env:
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configure build
        run: |
          sed -i "s|^ANDROID_ABI=.*|ANDROID_ABI=${{ matrix.arch }}|" config.sh

      - name: Build debug
        run: |
          sed -i "s|^BUILD_TYPE=.*|BUILD_TYPE=debug|" config.sh
          sed -i "s|^VERSION=.*|VERSION=${VERSION}|" config.sh
          chmod +x build.sh
          ./build.sh

      - name: Package debug
        run: |
          PKG="termux-daemon-${VERSION}-${{ matrix.arch }}-debug"
          mkdir "$PKG"
          cp -a build/termux-daemon-${{ matrix.arch }}-debug/. "$PKG/"
          tar -cvzf "${PKG}.tar.gz" "$PKG"

      - name: Build release
        run: |
          sed -i "s|^BUILD_TYPE=.*|BUILD_TYPE=release|" config.sh
          sed -i "s|^VERSION=.*|VERSION=${VERSION}|" config.sh
          chmod +x build.sh
          ./build.sh

      - name: Package release
        run: |
          PKG="termux-daemon-${VERSION}-${{ matrix.arch }}-release"
          mkdir "$PKG"
          cp -a build/termux-daemon-${{ matrix.arch }}-release/. "$PKG/"
          tar -cvzf "${PKG}.tar.gz" "$PKG"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            termux-daemon-${{ github.ref_name }}-${{ matrix.arch }}-debug.tar.gz
            termux-daemon-${{ github.ref_name }}-${{ matrix.arch }}-release.tar.gz
